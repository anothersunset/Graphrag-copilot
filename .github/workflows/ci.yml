name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    strategy:
      matrix:
        python-version: ["3.11"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('backend/requirements.txt') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff
          grep -v "^torch==\|^transformers==\|^sentence-transformers==\|^faiss-cpu==\|^langchain==\|^langchain-community==\|^langchain-huggingface==\|^pypdf2==\|^python-docx==\|^python-pptx==\|^unstructured==\|^pdf2image==\|^pytesseract==\|^paddleocr==\|^paddlepaddle==\|^openai-whisper==\|^neo4j==\|^networkx==" requirements.txt > requirements-ci.txt
          pip install -r requirements-ci.txt

      - name: Lint with ruff
        run: ruff check app/ config/ tests/ --ignore E402,E501 || true

      - name: Run tests
        run: python -m pytest tests/ -q --tb=short

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci || npm install

      - name: Build
        run: npm run build
