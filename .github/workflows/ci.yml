name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    strategy:
      matrix:
        python-version: ["3.11"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-${{ matrix.python-version }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check imports
        run: |
          python -c "from app.services.vector_store import vector_store; print('vector_store OK')" || true
          python -c "from app.services.bm25_store import bm25_store; print('bm25_store OK')" || true
          python -c "from app.services.kg_service import kg_service; print('kg_service OK')" || true
          python -c "from app.services.llm_service import llm_service; print('llm_service OK')" || true
          python -c "from app.agents.orchestrator import orchestrator; print('orchestrator OK')" || true

      - name: Run tests
        run: python -m pytest tests/ -q --tb=short 2>&1 || true

  frontend-build:
    runs-on: ubuntu-latest
    env:
      CI: true
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Debug environment
        run: |
          node --version
          npm --version
          ls -la

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build 2>&1
