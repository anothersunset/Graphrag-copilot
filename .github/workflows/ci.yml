name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    strategy:
      matrix:
        python-version: ["3.11"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-${{ matrix.python-version }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest-cov

      - name: Lint (syntax-level only)
        # E9/F63/F7/F82 仅拦截不能运行的代码（语法、未定义名、f-string bug），
        # 不会被风格问题误伤。待仓库成熟后可收紧为完整规则集。
        run: ruff check . --select=E9,F63,F7,F82 --extend-exclude=data,logs

      - name: Check imports
        run: |
          python -c "from app.services.vector_store import vector_store; print('vector_store OK')"
          python -c "from app.services.bm25_store import bm25_store; print('bm25_store OK')"
          python -c "from app.services.kg_service import kg_service; print('kg_service OK')"
          python -c "from app.services.llm_service import llm_service; print('llm_service OK')"
          python -c "from app.agents.orchestrator import orchestrator; print('orchestrator OK')"

      - name: Run tests with coverage
        run: |
          python -m pytest tests/ -q --tb=short \
            --cov=app --cov=config \
            --cov-report=xml --cov-report=term

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: backend/coverage.xml
          if-no-files-found: ignore

  frontend-build:
    runs-on: ubuntu-latest
    env:
      CI: true
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Debug environment
        run: |
          node --version
          npm --version
          ls -la

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
