name: CI · Docs

on:
  push:
    branches: [main]
    paths:
      - "**/*.md"
      - ".github/workflows/ci-docs.yml"
  pull_request:
    branches: [main]
    paths:
      - "**/*.md"
      - ".github/workflows/ci-docs.yml"

permissions:
  contents: read

jobs:
  markdown:
    name: Markdown lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v17
        with:
          globs: |
            **/*.md
            !**/node_modules/**
            !backend/**
            !frontend/**
        continue-on-error: true  # advisory in W1; enforced from W6
