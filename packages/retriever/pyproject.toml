[project]
name = "graphrag-retriever"
version = "0.1.0"
description = "4-way hybrid retrieval (vector/BM25/KG/web) — W3 implementation"
requires-python = ">=3.12"
dependencies = ["graphrag-schemas"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/graphrag_retriever"]
