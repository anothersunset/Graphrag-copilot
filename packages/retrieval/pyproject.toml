[project]
name = "graphrag-retrieval"
version = "0.1.0"
description = "Four-route retrieval (vector + BM25 + KG + web) with BGE rerank for GraphRAG Copilot v3.1."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [{ name = "lee fanwei" }]
dependencies = [
    "pydantic>=2.7",
    "qdrant-client>=1.12,<2",
    "rank-bm25>=0.2.2",
    "jieba>=0.42.1",
    "httpx>=0.27",
    "numpy>=1.26",
    "graphrag-schemas",
]

[project.optional-dependencies]
kg = [
    "neo4j>=5.20",
]
rerank = [
    "FlagEmbedding>=1.3",
    "torch>=2.2",
]
embeddings = [
    "sentence-transformers>=3.0",
]
dev = [
    "pytest>=8.3",
    "pytest-asyncio>=0.24",
    "pytest-cov>=5.0",
    "ruff>=0.7",
    "pyright>=1.1.380",
]

[tool.uv.sources]
graphrag-schemas = { workspace = true }

[build-system]
requires = ["hatchling>=1.25"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/graphrag_retrieval"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
addopts = "-ra --strict-markers"
