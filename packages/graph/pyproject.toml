[project]
name = "graphrag-graph"
version = "0.1.0"
description = "LangGraph 7-node Agentic RAG orchestrator for GraphRAG Copilot v3.1."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [{ name = "lee fanwei" }]
dependencies = [
    "langgraph>=0.2.40,<0.3",
    "pydantic>=2.7",
    "typing-extensions>=4.10",
    "graphrag-schemas",
]

[project.optional-dependencies]
llm = [
    "litellm>=1.50,<2",
    "instructor>=1.5",
]
observability = [
    "langfuse>=2.50,<3",
]
dev = [
    "pytest>=8.3",
    "pytest-asyncio>=0.24",
    "pytest-cov>=5.0",
    "ruff>=0.7",
    "pyright>=1.1.380",
]

[tool.uv.sources]
graphrag-schemas = { workspace = true }

[build-system]
requires = ["hatchling>=1.25"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/graphrag_graph"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
addopts = "-ra --strict-markers"
