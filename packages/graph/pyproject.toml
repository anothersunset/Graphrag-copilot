[project]
name = "graphrag-graph"
version = "0.1.0"
description = "LangGraph 7-node orchestrator (Planner/Retriever/Evaluator/CRAG/Synthesizer/Auditor/Responder) — W2 implementation"
requires-python = ">=3.12"
dependencies = ["graphrag-schemas"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/graphrag_graph"]
