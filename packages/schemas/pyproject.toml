[project]
name = "graphrag-schemas"
version = "0.1.0"
description = "Pydantic schemas — the type hub for graphrag-copilot"
requires-python = ">=3.12"
dependencies = ["pydantic>=2.9"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/graphrag_schemas"]
