[project]
name = "graphrag-reranker"
version = "0.1.0"
description = "BGE-Reranker-v2-m3 second-stage reranker — W3 implementation"
requires-python = ">=3.12"
dependencies = ["graphrag-schemas"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/graphrag_reranker"]
