[project]
name = "graphrag-kg"
version = "0.1.0"
description = "Knowledge Graph: Neo4j 3-hop subgraph + entity extraction — W3/W4 implementation"
requires-python = ">=3.12"
dependencies = ["graphrag-schemas"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/graphrag_kg"]
