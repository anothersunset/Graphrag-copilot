[project]
name = "graphrag-observability"
version = "0.1.0"
description = "Langfuse tracing + audit export for GraphRAG Copilot v3.1."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [{ name = "lee fanwei" }]
dependencies = [
    "pydantic>=2.7",
    "langfuse>=2.50,<3",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.3",
    "pytest-cov>=5.0",
    "ruff>=0.7",
    "pyright>=1.1.380",
]

[build-system]
requires = ["hatchling>=1.25"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/graphrag_observability"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-ra --strict-markers"
