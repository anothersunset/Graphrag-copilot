[project]
name = "graphrag-observability"
version = "0.1.0"
description = "Langfuse + RetrievalTrace emitter + structured logging — W5 implementation"
requires-python = ">=3.12"
dependencies = ["graphrag-schemas"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/graphrag_observability"]
