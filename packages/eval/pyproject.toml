[project]
name = "graphrag-eval"
version = "0.1.0"
description = "RAGAS + DeepEval + custom Agentic-RAG metrics for GraphRAG Copilot v3.1."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [{ name = "lee fanwei" }]
dependencies = [
    "pydantic>=2.7",
]

[project.optional-dependencies]
ragas = ["ragas>=0.2,<0.3"]
deepeval = ["deepeval>=2.0,<3"]
dev = [
    "pytest>=8.3",
    "pytest-cov>=5.0",
    "ruff>=0.7",
    "pyright>=1.1.380",
]

[build-system]
requires = ["hatchling>=1.25"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/graphrag_eval"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-ra --strict-markers"
